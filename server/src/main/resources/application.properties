spring.application.name=agent-memory-server

# --- agent-memory configuration layering (issue #2, invariant #1) ---------------------------
# Precedence, lowest first: built-in @DefaultValue (see AgentMemoryProperties)
#   -> external agent-memory.yml -> environment variables (e.g. AGENT_MEMORY_SERVER_PORT).
# The external file is the user-facing config file. It is optional: with no file present the
# server starts on defaults. Override its location with the AGENT_MEMORY_CONFIG env var (or
# --agent-memory.config=<path>); it is read by ./agent-memory.yml in the working dir otherwise.
# OS environment variables / system properties always outrank an imported file, which gives us
# env > file > defaults for free.
spring.config.import=optional:file:${AGENT_MEMORY_CONFIG:./agent-memory.yml}

# Bind on the configured address/port so the running server matches the resolved config.
server.address=${agent-memory.server.address:127.0.0.1}
server.port=${agent-memory.server.port:8080}

# --- Auth (issue #38, DD-007): secure-by-default --------------------------------------------
# Out of the box the server binds loopback (127.0.0.1) with NO auth — a single-user laptop needs no
# ceremony. Exposing the server is a deliberate opt-in:
#   1. Generate a token:   java -jar agent-memory-server.jar --generate-auth-token
#   2. Enable auth + set the token (config file or env), and bind beyond loopback if remote:
#        agent-memory.auth.enabled=true
#        agent-memory.auth.token=<the generated token>   # env: AGENT_MEMORY_AUTH_TOKEN
#        agent-memory.server.address=0.0.0.0              # only if exposing off-box
#   3. When bound non-loopback, list the host names you serve (anti-DNS-rebinding guard):
#        agent-memory.auth.allowed-hosts=memory.example.com   # env: AGENT_MEMORY_AUTH_ALLOWED_HOSTS
# When enabled, all routes (/mcp, /hook, /handoff, /api/v1, admin ops, /web) require the bearer token
# (Authorization: Bearer <token>); /web also accepts it as the HTTP Basic password. /healthz stays
# open. A non-GET browser request must be same-origin. Enabling auth without a token fails fast.

# --- Postgres derived index + Flyway (issue #4) ---------------------------------------------
# The single DataSource is fed from the agent-memory.db.* config group (AgentMemoryProperties.Db),
# so there is one place to point at Postgres. Defaults match docker/compose.yml.
spring.datasource.url=${agent-memory.db.url:jdbc:postgresql://127.0.0.1:5432/agent_memory}
spring.datasource.username=${agent-memory.db.username:agent_memory}
spring.datasource.password=${agent-memory.db.password:}

# Flyway owns the schema (migrations under db/migration). Enabled by default; it runs at startup
# against the DataSource above (index commits with the data — invariant #3). baseline-on-migrate
# lets Flyway adopt a pre-existing non-empty database without a manual baseline step.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- LLM provider (issue #6, DD-005, invariants #7/#13/#14) ----------------------------------
# The LLM is a REQUIRED dependency: the server probes the configured chat provider at startup and
# FAILS FAST if it is unreachable. There is no built-in default — choose a provider and supply its
# key via the external agent-memory.yml or environment variables (e.g. AGENT_MEMORY_LLM_AUTH_API_KEY).
# Never hard-code keys in this file. Built-in chat providers: anthropic, test (deterministic, offline),
# openai/openai-compat (stubbed for #40).
#   agent-memory.llm.auth.provider=anthropic
#   agent-memory.llm.auth.api-key=<set via env AGENT_MEMORY_LLM_AUTH_API_KEY>
#   agent-memory.llm.auth.model=claude-opus-4-8        # optional; provider default used otherwise
#   agent-memory.llm.auth.base-url=                     # optional; for gateways/proxies
#
# Embeddings are a SEPARATE, default-on axis (DD-005). If unconfigured or unreachable, recall
# degrades to FTS + graph (a non-fatal startup warning). Built-in embedders: voyage, test.
# voyage-3 emits 1024-dim vectors — the dimension contract issue #4's pgvector column matches.
#   agent-memory.embeddings.auth.provider=voyage
#   agent-memory.embeddings.auth.api-key=<set via env AGENT_MEMORY_EMBEDDINGS_AUTH_API_KEY>
#   agent-memory.embeddings.auth.model=voyage-3
