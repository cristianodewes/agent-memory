# Test-scoped overrides. Keep the @SpringBootTest data dir under target/ so running the suite
# never creates or touches the real ~/.agent-memory on a developer's machine.
spring.application.name=agent-memory-server
agent-memory.data.dir=target/test-agent-memory-data

# DB wiring is NOT disabled globally here: the DB-less context test (AgentMemoryServerApplicationTests)
# excludes the DataSource + Flyway auto-configurations on its own @SpringBootTest, and the migration
# test (SchemaMigrationTest) brings a real Testcontainers Postgres via @DynamicPropertySource. Leaving
# Flyway at its default-on means the migration test exercises the same boot path as production.
