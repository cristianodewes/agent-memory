# Test-scoped overrides. Keep the @SpringBootTest data dir under target/ so running the suite
# never creates or touches the real ~/.agent-memory on a developer's machine.
spring.application.name=agent-memory-server
agent-memory.data.dir=target/test-agent-memory-data

# The data-dir process lock (#33, invariant #9) is acquired at startup in production. Disable it
# globally for tests so the many @SpringBootTest contexts that share the default data dir above do
# not contend on one lock file; the lifecycle reset test re-enables it via @SpringBootTest(properties=)
# on its own isolated @TempDir data dir to exercise the live-process guard deterministically.
agent-memory.lifecycle.process-lock-enabled=false

# Disable the short-TTL recall-result cache (#142) globally for tests. The @Primary CachingRecallService
# bean is still wired (its wiring is asserted by LlmRecallIntegrationTest), but it runs as a transparent
# pass-through, so the recall integration tests that seed/mutate the DB and then re-issue the SAME
# (scope, prompt, limit) — e.g. HybridRecallTest.graphArmPullsInNeighborOfAStrongFtsHit, which adds a link
# between two identical searches — read fresh each time instead of replaying the pre-mutation result. The
# cache's own hit/expiry/LRU/scope-isolation behavior is covered hermetically by CachingRecallServiceTest;
# a test that wants it on enables it via @SpringBootTest(properties=...).
agent-memory.recall.llm.cache.enabled=false

# NOTE: the LLM provider is deliberately NOT set here. The LLM is a required dependency (DD-005),
# so a full-context boot needs the deterministic, offline 'test' provider — but config tests assert
# the built-in defaults (ProviderAuth.NONE). Each full @SpringBootTest selects the test provider via
# its own @SpringBootTest(properties=...) so it doesn't leak into the defaults-precedence tests.
#
# DB wiring is likewise NOT disabled globally: the DB-less context test (AgentMemoryServerApplicationTests)
# excludes the DataSource + Flyway auto-configurations on its own @SpringBootTest, and the migration
# test (SchemaMigrationTest) brings a real Testcontainers Postgres via @DynamicPropertySource. Leaving
# Flyway at its default-on means the migration test exercises the same boot path as production.
