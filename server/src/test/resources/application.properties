# Test-scoped overrides. Keep the @SpringBootTest data dir under target/ so running the suite
# never creates or touches the real ~/.agent-memory on a developer's machine.
spring.application.name=agent-memory-server
agent-memory.data.dir=target/test-agent-memory-data

# NOTE: the LLM provider is deliberately NOT set here. The LLM is a required dependency (DD-005),
# so a full-context boot needs the deterministic, offline 'test' provider — but config tests assert
# the built-in defaults (ProviderAuth.NONE). Each full @SpringBootTest selects the test provider via
# its own @SpringBootTest(properties=...) so it doesn't leak into the defaults-precedence tests.
