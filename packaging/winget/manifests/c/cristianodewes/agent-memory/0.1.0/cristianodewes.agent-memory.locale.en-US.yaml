ShortDescription: LLM-powered long-term memory for AI coding agents (Go client).
Description: >-
  agent-memory is the Go client for an LLM-powered long-term memory for AI coding agents.
  It captures prompts, tool calls and session boundaries via lifecycle hooks, drains them
  to the agent-memory server, and wires Claude Code (hooks + MCP + self-routing) so memory
  accumulates across sessions. After install, run "agent-memory setup-agent" inside a
  project to configure it.
