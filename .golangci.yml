# golangci-lint configuration for the Go client.
# Pinned alongside the version in .github/workflows/ci.yml so local and CI runs
# agree. Keep the enabled set conservative for the M0 scaffold; tighten as the
# client grows.

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

issues:
  # Show every issue rather than collapsing duplicates, so nothing is hidden.
  max-issues-per-linter: 0
  max-same-issues: 0
