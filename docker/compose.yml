name: agent-memory

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentmemory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentmemory}
      POSTGRES_DB: ${POSTGRES_DB:-agentmemory}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentmemory}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The server does not connect to Postgres yet (that arrives with issue #4).
  # It is included so `docker compose up` brings the full local stack online.
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    environment:
      # The app defaults to binding 127.0.0.1; inside a container that is
      # unreachable through the published port. Listen on all interfaces so the
      # mapped 8080 (and the compose-smoke /healthz probe) can reach it.
      AGENT_MEMORY_SERVER_ADDRESS: 0.0.0.0
      # The LLM is a required dependency (DD-005): the server probes the
      # configured chat provider at startup and FAILS FAST if none is set. Use
      # the deterministic, offline 'test' provider (no API key, no network) so
      # the stack boots without external credentials. Point these at 'anthropic'
      # (+ AGENT_MEMORY_LLM_AUTH_API_KEY) / 'voyage' for a real local stack.
      AGENT_MEMORY_LLM_AUTH_PROVIDER: ${AGENT_MEMORY_LLM_AUTH_PROVIDER:-test}
      AGENT_MEMORY_EMBEDDINGS_AUTH_PROVIDER: ${AGENT_MEMORY_EMBEDDINGS_AUTH_PROVIDER:-test}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata:
