name: agent-memory

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentmemory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentmemory}
      POSTGRES_DB: ${POSTGRES_DB:-agentmemory}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentmemory}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # On boot the server runs the Flyway migrations (issue #4) against this Postgres, then serves.
  # `docker compose up` brings the full local stack online with a migrated schema.
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    environment:
      # The app defaults to binding 127.0.0.1; inside a container that is
      # unreachable through the published port. Listen on all interfaces so the
      # mapped 8080 (and the compose-smoke /healthz probe) can reach it.
      AGENT_MEMORY_SERVER_ADDRESS: 0.0.0.0
      # Point the derived index at the compose Postgres (relaxed-binding of agent-memory.db.*).
      # Host is the `postgres` service on the compose network; creds match the postgres service.
      AGENT_MEMORY_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-agentmemory}
      AGENT_MEMORY_DB_USERNAME: ${POSTGRES_USER:-agentmemory}
      AGENT_MEMORY_DB_PASSWORD: ${POSTGRES_PASSWORD:-agentmemory}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata:
