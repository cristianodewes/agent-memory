name: agent-memory

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentmemory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentmemory}
      POSTGRES_DB: ${POSTGRES_DB:-agentmemory}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentmemory}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The server does not connect to Postgres yet (that arrives with issue #4).
  # It is included so `docker compose up` brings the full local stack online.
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata:
